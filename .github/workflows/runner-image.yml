name: Build Runner Image

on:
  push:
    branches: [main]
    paths:
      - "packages/effortless-runner/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: packages/effortless-runner
          push: true
          tags: |
            kondaurov/effortless-aws-runner:latest
            kondaurov/effortless-aws-runner:${{ github.sha }}
